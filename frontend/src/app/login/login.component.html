<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="logo-icon">🍗</span>
      <h1>Asadero La Mocahua</h1>
      <p>{{ pageTitle }}</p>
    </div>

    <form (ngSubmit)="onLogin()" class="login-form">
      @if (error) {
      <div class="error-msg">{{ error }}</div>
      }

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="admin@lamocahua.com"
          autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••"
          autocomplete="current-password">
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        @if (loading) {
        <span class="spinner"></span> Ingresando...
        } @else {
        Iniciar Sesión
        }
      </button>
    </form>

    <div class="login-footer">
      <p *ngIf="roleId === 'cliente'" style="margin-bottom: 10px;">
        ¿No tienes cuenta? <a routerLink="/website/register"
          style="color: #4f46e5; text-decoration: none; font-weight: 500;">Regístrate aquí</a>
      </p>
      <p style="margin-bottom: 20px;">
        <a routerLink="/welcome" style="color: #64748b; text-decoration: none;"><i class="fas fa-arrow-left"></i> Volver
          a Opciones</a>
      </p>

      <div *ngIf="roleId !== 'cliente'">
        <p>Credenciales de prueba:</p>
        <small>admin&#64;lamocahua.com / admin123</small>
      </div>
    </div>
  </div>
</div>
